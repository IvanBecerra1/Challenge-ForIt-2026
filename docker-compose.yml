services:
  backend:
    build: ./backend
    container_name: backend_forit2026
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env 
  frontend:
    build: ./frontend
    container_name: frontend_forit2026
    ports:
      - "5174:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
